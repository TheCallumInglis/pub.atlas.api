name: PR
on:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Validate Maven wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Compile + test
        run: ./mvnw -B verify
